name: Export Web Build Zip 📦

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    name: Create Zip Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-DungeonBlox-WebGL
          restore-keys: |
            Library-DungeonBlox-

      - name: Unity Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL

      - name: Package Build
        run: |
          # Ensure the directory exists before zipping
          if [ -d "build/WebGL" ]; then
            cd build/WebGL
            zip -r ../../web-build.zip .
          else
            echo "Error: Build directory not found. Check Unity Builder logs above."
            exit 1
          fi
          
      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dungeon-Blox-Web-Build
          path: web-build.zip
